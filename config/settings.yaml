# Single source of truth for all tunable parameters.

metals:
  lookback_years: 3
  series:
    copper:
      label: "LME Copper Cash-Settlement"
      westmetall_field: LME_Cu_cash
      column_prefix: cu
    aluminium:
      label: "LME Aluminium Cash-Settlement"
      westmetall_field: LME_Al_cash
      column_prefix: al
  source:
    base_url: "https://www.westmetall.com/en/markdaten.php"
    user_agent: "Mozilla/5.0 (compatible; realoption-data-collector/1.0)"

fx:
  flow_ref: "EXR"
  series_key: "D.USD.EUR.SP00.A"
  source:
    base_url: "https://data-api.ecb.europa.eu/service/data"

fred:
  # SOFR = Secured Overnight Financing Rate, the standard USD risk-free proxy
  # since LIBOR's retirement. Used as the discount rate `r` for the buyperp
  # real-options lattice.
  series_id: SOFR
  source:
    base_url: "https://fred.stlouisfed.org/graph"

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  results_dir: results

output:
  # metals_prices.csv is copied into every use case listed here, so each
  # standalone results/<use_case>/*.py script can load it with no path at all.
  use_cases: [business, buyperp]
  processed_filename: metals_prices.parquet
  csv_filename: metals_prices.csv
  # SOFR is only needed by the buyperp valuation, so it's written just there.
  sofr_use_case: buyperp
  sofr_csv_filename: sofr_rate.csv

buyperp:
  # Year-1 Bermudan purchase-timing option: the company must buy its full
  # annual cable-input requirement exactly once, at whichever of n candidate
  # dates minimizes cost, and is forced to buy at the last one if it never
  # exercises earlier.
  cu_tonnes: 100
  al_tonnes: 100
  n_opportunities: 12
  monte_carlo:
    n_simulations: 10000
    seed: 42
